# Disable the blank line at the start of the prompt
# add_newline = false

# You can also replace your username with a neat symbol like ´äá to save some space
[username]
show_always = true
style_user  = "bg:#A7C080 bold black"
style_root  = "bg:#A7C080 bold black"
format      = '[$user]($style)'

[hostname]
style      = "bg:#A7C080 bold black"
ssh_only   = false
ssh_symbol = "¯¼ü "
format     = '[$ssh_symbol@$hostname](bold black bg:#A7C080)'
trim_at    = '.companyname.com'
disabled   = false


[directory]
style             = "bg:#DBBC7F bold black"
format            = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ÔÇĞ/"
read_only         = "¾░î¥"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music"     = "´Çü "
"Pictures"  = "´Ç¥ "

[git_branch]
style  = 'bg:#7FBBB3 bold black'
format = '[ on $symbol$branch(:$remote_branch)]($style)'
symbol = "´Éİ "

[git_status]
style = 'bg:#7FBBB3 bold black'
format = '([\[$all_status$ahead_behind\]]($style))'


[time]
disabled = true
time_format = "%R" # Hour:Minute Format
style = "bg:#E67E80 bold black"
format = '[­şòæ´©Å $time]($style)'

[status]
disabled = false
symbol = 'Ô£û'
success_symbol = 'Ô£ö'
