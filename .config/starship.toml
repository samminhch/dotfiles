format = """
вФМ\
[оВґ](#21282C)\
$username\
[оВі](bg:#404D44 fg:#21282C)\
$directory\
[оВі](fg:#404D44 bg:#5a6f5a)\
$git_branch\
$git_status\
[оВі](fg:#5a6f5a bg:#81986D)\
$c\
$python\
$java\
$javascript\
$elixir\
$elm\
$golang\
$haskell\
$julia\
$nodejs\
$nim\
$rust\
$scala\
[оВі](fg:#81986D bg:#81986D)\
$docker_context\
[оВі](fg:#81986D bg:#E67E80)\
$time\
$status\
[оВі ](fg:#E67E80)
вФФвФАвЦґ\
"""

# Disable the blank line at the start of the prompt
# add_newline = false

# You can also replace your username with a neat symbol like пД† to save some space
[username]
show_always = true
style_user = "bg:#21282C"
style_root = "bg:#21282C"
format = '[$user]($style)'

[directory]
style = "bg:#404D44"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вА¶/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "пЬШ "
"Downloads" = "пАЩ "
"Music" = "пАБ "
"Pictures" = "пАЊ "
# Keep in mind that the order matters. For example:
# "Important Documents" = " пЬШпД™ "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important пЬШ " = " пЬШпД™ "

[c]
symbol = "оШЮ "
style = "bg:#81986D"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = "пМИ "
style = "bg:#94AC77"
format = '[ $symbol $context ]($style) $path'

[elixir]
symbol = "оЙµ "
style = "bg:#81986D"
format = '[ $symbol ($version) ]($style)'

[elm]
symbol = "оШђ "
style = "bg:#81986D"
format = '[ $symbol ($version) ]($style)'

[git_branch]
symbol = "пРШ"
style = "bg:#5a6f5a"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#5a6f5a"
format = '[$all_status$ahead_behind ]($style)'

[golang]
symbol = "оШІ "
style = "bg:#81986D"
format = '[ $symbol ($version) ]($style)'

[haskell]
symbol = "оЭЈ "
style = "bg:#81986D"
format = '[ $symbol ($version) ]($style)'

[java]
symbol = "оЙЦ "
style = "bg:#81986D"
format = '[ $symbol ($version) ]($style)'

[julia]
symbol = "оШ§ "
style = "bg:#81986D"
format = '[ $symbol ($version) ]($style)'

[nodejs]
format = '[ $symbol ](bg:#81986D)'

[nim]
symbol = "пЪ§ "
style = "bg:#81986D"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = "оЮ®"
style = "bg:#81986D"
format = '[ $symbol ($version) ]($style)'

[scala]
symbol = "оЬЈ "
style = "bg:#81986D"
format = '[ $symbol ($version) ]($style)'

[python]
style = "bg:#81986D"
format = '[ $symbol ($version) ]($style)'

[time]
disabled = true
time_format = "%R" # Hour:Minute Format
style = "bg:#E67E80"
format = '[ вЩ• $time ]($style)'

[status]
disabled = false
symbol = 'вЬЦ'
success_symbol = 'вЬФ'
style = "bg:#E67E80"
format = "[ $symbol ]($style)"
